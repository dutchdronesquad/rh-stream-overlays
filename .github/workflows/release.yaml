---
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload release asset
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2
      - name: 🏗 Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: preact/package-lock.json
      - name: 🏗 Install frontend dependencies
        run: npm ci
        working-directory: preact
      - name: 🚀 Build frontend
        run: npm run build
        working-directory: preact
      - name: 📦 Package plugin
        run: zip -r stream_overlays.zip custom_plugins
      - name: ⬆️ Upload release asset
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: stream-overlays.zip
