{% extends 'layout-basic.html' %}{% block title %}{{ __('Stream') }}: {{ __('Seat') }} {{ node_id + 1 }}{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('stream_overlays.static', filename='css/main/overlay.css') }}">
<link rel="stylesheet" href="{{ url_for('stream_overlays.static', filename='css/overlay_node_apex.css') }}">
<script>
    streamnode = '{{ node_id }}'
    document.documentElement.classList.add('apex-theme-page');
</script>
<script type="text/javascript" charset="utf-8" src="{{ url_for('stream_overlays.static', filename='js/overlay_node_shared.js') }}"></script>
<script type="text/javascript" charset="utf-8" src="{{ url_for('stream_overlays.static', filename='js/overlay_node_apex.js') }}"></script>
{% endblock %}

{% block content %}
<main class="page-streamnode apex-theme">
    <!-- Popup animation for new lap -->
    <div id="popup-container">
        <div class="popup-content">
            <div class="popup-lap">LAP <span class="lap_number">0</span></div>
            <div class="popup-time" id="last_laptime"></div>
        </div>
    </div>

    <!-- Position badge - top left corner -->
    <div class="position-badge">
        <span class="position-number" id="pilot_position"></span>
        <sup class="position-ordinal" id="pos_ordinal"></sup>
    </div>

    <!-- Info card - bottom right corner -->
    <div class="apex-overlay-container">
        <div class="info-card">
            <!-- Pilot info header -->
            <div class="pilot-header">
                <div class="pilot-callsign" id="pilot_callsign"></div>
                <div class="pilot-laps">
                    <span class="lap-label">LAP</span>
                    <span class="lap_number">0</span>
                </div>
            </div>

            <!-- Time display -->
            <div class="time-display">
                <div class="total-time" id="total_time">0:00.000</div>
            </div>

            <!-- Recent laps -->
            <div class="laps-section">
                <ul class="laps-list" id="pilot_lap-times"></ul>
            </div>
        </div>

        <!-- Accent bar -->
        <div class="accent-bar"></div>
    </div>
</main>
{% endblock %}
