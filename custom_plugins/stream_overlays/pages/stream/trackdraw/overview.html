{% extends 'layout-basic.html' %}{% block title %}{{ __('Stream') }}: {{ __('TrackDraw Overview') }}{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('stream_overlays.static', filename='css/main/trackdraw_map.css') }}">
<link rel="stylesheet" href="{{ url_for('stream_overlays.static', filename='css/main/trackdraw_overview.css') }}">
<link rel="stylesheet" href="{{ url_for('stream_overlays.static', filename='css/' ~ theme_name ~ '/trackdraw_map.css') }}">
<script>
    window.trackdrawOverlayTheme = '{{ theme_name }}';
    window.trackdrawOverlayVariant = 'overview';
    var data_dependencies = ["current_heat", "race_status", "current_laps", "leaderboard"];
</script>
<script type="text/javascript" charset="utf-8" src="{{ url_for('stream_overlays.static', filename='js/trackdraw_map.js') }}"></script>
<script type="text/javascript" charset="utf-8" src="{{ url_for('stream_overlays.static', filename='js/trackdraw_overview.js') }}"></script>
{% endblock %}

{% block content %}
<main class="trackdraw-map trackdraw-map--overview" data-theme="{{ theme_name }}" data-variant="overview">
    <section class="trackdraw-map__panel trackdraw-map__overview-panel">
        <div class="trackdraw-map__overview-shell">
            <header class="trackdraw-map__overview-header">
                <div>
                    <span class="trackdraw-map__overview-brand">TrackDraw</span>
                    <h1 id="trackdraw-overview-title" class="trackdraw-map__overview-title">Overview</h1>
                </div>
                <div class="trackdraw-map__overview-status">
                    <span id="trackdraw-cache-status" class="trackdraw-map__status">Loading</span>
                    <span id="trackdraw-overview-race-status" class="trackdraw-map__overview-state">Idle</span>
                </div>
            </header>
            <div class="trackdraw-map__overview-body">
                <div class="trackdraw-map__overview-stage">
                    <svg
                        id="trackdraw-map-svg"
                        class="trackdraw-map__svg"
                        preserveAspectRatio="xMidYMid meet"
                        role="img"
                        aria-label="TrackDraw live overview map"
                    ></svg>
                    <div id="trackdraw-map-message" class="trackdraw-map__message is-visible">
                        Loading TrackDraw map...
                    </div>
                </div>
                <aside class="trackdraw-map__overview-sidebar">
                    <section class="trackdraw-map__overview-card">
                        <span class="trackdraw-map__overview-kicker">Leader</span>
                        <strong id="trackdraw-overview-leader" class="trackdraw-map__overview-leader">--</strong>
                    </section>
                    <section class="trackdraw-map__overview-card">
                        <span class="trackdraw-map__overview-kicker">Pilots</span>
                        <ol id="trackdraw-overview-leaderboard" class="trackdraw-map__overview-leaderboard"></ol>
                    </section>
                </aside>
            </div>
        </div>
    </section>
</main>
{% endblock %}
