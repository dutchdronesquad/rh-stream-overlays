{% extends 'layout-basic.html' %}{% block title %}{{ __('Stream') }}: {{ __('TrackDraw Map') }}{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('stream_overlays.static', filename='css/main/trackdraw_map.css') }}">
<link rel="stylesheet" href="{{ url_for('stream_overlays.static', filename='css/' ~ theme_name ~ '/trackdraw_map.css') }}">
<script>
    window.trackdrawOverlayTheme = {{ theme_name | tojson }};
    var data_dependencies = ["current_heat", "race_status", "current_laps", "leaderboard"];
</script>
<script type="text/javascript" charset="utf-8" src="{{ url_for('stream_overlays.static', filename='js/trackdraw_map.js') }}"></script>
<script type="module" src="{{ url_for('stream_overlays.static', filename='dist/trackdraw-map.js') }}"></script>
{% endblock %}

{% block content %}
<div
    id="overlay-root"
    data-theme="{{ theme_name }}"
    data-page="trackdraw-map"
></div>
{% endblock %}
