{% extends 'stream/heat/heat_base.html' %}
{% set theme_name = 'dds' %}
{% block heat_theme_css %}
<link rel="stylesheet" href="{{ url_for('stream_overlays.static', filename='css/dds/heat.css') }}">
{% endblock %}
{% block content %}
<main class="page-streamheat theme-{{ theme_name }}">
	<div class="dds-shell">
		<header class="dds-header">
			<div class="dds-header__top">
				<p class="lead" id="heat_lead">{{ __('Up Next') }}</p>
				<span class="event-badge">{{ getOption('eventName') }}</span>
			</div>
			<div class="dds-header__main">
				<h1 id="heat_name">{{ __('Waiting for heat...') }}</h1>
				<div class="meta-line">
					<span id="class_name"></span>
					<span id="round_info"></span>
					<span id="format_name"></span>
				</div>
			</div>
		</header>

		<section class="dds-body">
			<div class="body-label">
				<span class="accent-bar"></span>
				<span>{{ __('Seat lineup') }}</span>
			</div>
			<div id="heat_slots" class="heat-grid dds-grid"></div>
		</section>

		<footer class="dds-foot">
			<span id="heat_notice"></span>
		</footer>
	</div>
</main>
{% endblock %}
